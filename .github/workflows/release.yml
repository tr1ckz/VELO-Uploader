name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Derive app version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v', 'V')
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish
        run: dotnet publish VeloUploader.csproj -c Release -r win-x64 --self-contained -o publish -p:Version=${{ env.APP_VERSION }}

      - name: Download portable FFmpeg
        shell: pwsh
        run: |
          # Download FFmpeg portable full build
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/8.1/ffmpeg-8.1-full_build.zip"
          $zipPath = "ffmpeg-portable.zip"
          $extractPath = "publish/ffmpeg-portable"
          
          Write-Host "Downloading FFmpeg from $ffmpegUrl..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          
          Write-Host "Extracting to $extractPath..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath
          
          # The archive structure is ffmpeg-8.1-full_build/bin/ffmpeg.exe
          # Move contents to make bin/ directly under ffmpeg-portable/
          $srcBin = Get-ChildItem -Path "$extractPath" -Directory | Where-Object { $_.Name -match "^ffmpeg-" } | Select-Object -First 1
          if ($srcBin) {
            Move-Item -Path "$($srcBin.FullName)/*" -Destination $extractPath -Force
            Remove-Item -Path "$($srcBin.FullName)" -Force
          }
          
          Write-Host "FFmpeg portable ready at: $extractPath/bin/ffmpeg.exe"
          Remove-Item $zipPath

      - name: Zip release
        run: Compress-Archive -Path publish/* -DestinationPath VeloUploader-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: VeloUploader-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
